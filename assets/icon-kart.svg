<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" fill="none">
  <!-- Anneau de traction avant gauche -->
  <circle cx="8" cy="58" r="4" stroke="currentColor" stroke-width="3" fill="none"/>
  <line x1="12" y1="58" x2="22" y2="58" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>

  <!-- Axe bas du châssis -->
  <line x1="22" y1="58" x2="98" y2="58" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Roue arrière gauche -->
  <circle cx="28" cy="62" r="14" stroke="currentColor" stroke-width="5" fill="none"/>
  <circle cx="28" cy="62" r="6" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <line x1="28" y1="56" x2="28" y2="68" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="62" x2="34" y2="62" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="23.8" y1="57.8" x2="32.2" y2="66.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="23.8" y1="66.2" x2="32.2" y2="57.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <!-- Roue avant droite -->
  <circle cx="95" cy="62" r="14" stroke="currentColor" stroke-width="5" fill="none"/>
  <circle cx="95" cy="62" r="6" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <line x1="95" y1="56" x2="95" y2="68" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="89" y1="62" x2="101" y2="62" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="90.8" y1="57.8" x2="99.2" y2="66.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="90.8" y1="66.2" x2="99.2" y2="57.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <!-- Cadre châssis diagonal -->
  <line x1="28" y1="58" x2="80" y2="18" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="95" y1="58" x2="80" y2="18" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Barre transversale châssis -->
  <line x1="45" y1="46" x2="88" y2="46" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <!-- Renfort siège -->
  <line x1="60" y1="58" x2="75" y2="28" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>

  <!-- Siège -->
  <path d="M58 55 Q62 35 74 26 Q76 40 70 56 Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" fill="none"/>

  <!-- Guidon vertical -->
  <line x1="80" y1="18" x2="80" y2="6" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <!-- Guidon horizontal -->
  <line x1="70" y1="6" x2="90" y2="6" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <!-- Poignées guidon -->
  <circle cx="70" cy="6" r="3" fill="currentColor"/>
  <circle cx="90" cy="6" r="3" fill="currentColor"/>
</svg>
