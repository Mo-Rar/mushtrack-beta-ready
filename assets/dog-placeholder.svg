<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond -->
  <circle cx="50" cy="50" r="50" fill="#f5f0eb"/>

  <!-- Corps du chien (husky de profil, tourné vers la droite) -->
  <!-- Corps principal -->
  <ellipse cx="50" cy="60" rx="24" ry="16" fill="#6b5b4e"/>
  <!-- Ventre clair -->
  <ellipse cx="50" cy="64" rx="16" ry="10" fill="#c9b8a8"/>

  <!-- Cou -->
  <ellipse cx="33" cy="52" rx="9" ry="8" fill="#6b5b4e"/>

  <!-- Tête -->
  <ellipse cx="25" cy="45" rx="13" ry="12" fill="#6b5b4e"/>
  <!-- Museau -->
  <ellipse cx="15" cy="49" rx="7" ry="5" fill="#c9b8a8"/>
  <!-- Nez -->
  <ellipse cx="10" cy="48" rx="3" ry="2.5" fill="#2d1a0e"/>
  <!-- Oeil -->
  <circle cx="20" cy="42" r="2.5" fill="#fff"/>
  <circle cx="20" cy="42" r="1.5" fill="#1e90ff"/>
  <circle cx="20" cy="42" r="0.7" fill="#111"/>

  <!-- Oreilles -->
  <polygon points="28,34 22,26 35,30" fill="#6b5b4e"/>
  <polygon points="28,34 24,28 34,31" fill="#3d2b1f"/>
  <polygon points="38,33 33,26 44,29" fill="#6b5b4e"/>

  <!-- Masque blanc husky -->
  <ellipse cx="22" cy="45" rx="8" ry="7" fill="#e8ddd5" opacity="0.5"/>

  <!-- Pattes avant -->
  <rect x="27" y="70" width="7" height="16" rx="3.5" fill="#6b5b4e"/>
  <rect x="37" y="72" width="7" height="14" rx="3.5" fill="#6b5b4e"/>
  <!-- Pattes arrière -->
  <rect x="57" y="70" width="7" height="16" rx="3.5" fill="#6b5b4e"/>
  <rect x="67" y="68" width="7" height="18" rx="3.5" fill="#5a4a3f"/>

  <!-- Queue relevée -->
  <path d="M74 60 Q88 40 82 28" stroke="#6b5b4e" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M74 60 Q86 42 80 30" stroke="#c9b8a8" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- HARNAIS -->
  <!-- Collier -->
  <rect x="27" y="50" width="15" height="4" rx="2" fill="#fc4c02" opacity="0.9"/>
  <!-- Sangle dorsale -->
  <rect x="36" y="47" width="28" height="4" rx="2" fill="#fc4c02" opacity="0.9"/>
  <!-- Sangle thoracique (autour du corps) -->
  <path d="M42 54 Q50 68 58 54" stroke="#fc4c02" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Anneau de traction (point d'attache) -->
  <circle cx="70" cy="52" r="3.5" fill="#fc4c02" opacity="0.9"/>
  <circle cx="70" cy="52" r="2" fill="#fff" opacity="0.6"/>

  <!-- Pattes - sabots blancs -->
  <ellipse cx="30" cy="85" rx="4" ry="2" fill="#c9b8a8"/>
  <ellipse cx="40" cy="85" rx="4" ry="2" fill="#c9b8a8"/>
  <ellipse cx="60" cy="85" rx="4" ry="2" fill="#c9b8a8"/>
  <ellipse cx="70" cy="85" rx="4" ry="2" fill="#c9b8a8"/>
</svg>
