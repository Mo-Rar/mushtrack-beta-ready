<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond dégradé doux -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4ef"/>
      <stop offset="100%" stop-color="#ffe8dc"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Silhouette chien de traîneau en course, propre et simple -->
  <g fill="#fc4c02" opacity="0.85">
    <!-- Tête -->
    <ellipse cx="22" cy="36" rx="10" ry="9"/>
    <!-- Oreille pointue -->
    <polygon points="18,28 14,18 26,26"/>
    <!-- Museau -->
    <ellipse cx="13" cy="40" rx="5" ry="4"/>
    <!-- Oeil (négatif blanc) -->
    <circle cx="18" cy="33" r="2.2" fill="white" opacity="0.9"/>
    <circle cx="18" cy="33" r="1" fill="#fc4c02"/>

    <!-- Corps allongé en course -->
    <ellipse cx="52" cy="52" rx="28" ry="14"/>

    <!-- Cou -->
    <ellipse cx="32" cy="43" rx="10" ry="7" transform="rotate(-15 32 43)"/>

    <!-- Pattes avant étirées -->
    <rect x="28" y="60" width="8" height="18" rx="4" transform="rotate(-20 28 60)"/>
    <rect x="40" y="63" width="8" height="16" rx="4" transform="rotate(10 40 63)"/>

    <!-- Pattes arrière -->
    <rect x="62" y="58" width="8" height="18" rx="4" transform="rotate(15 62 58)"/>
    <rect x="72" y="55" width="8" height="20" rx="4" transform="rotate(-10 72 55)"/>

    <!-- Queue relevée -->
    <path d="M80 48 Q92 30 85 18" stroke="#fc4c02" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- Harnais — traits blancs propres -->
  <g stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9">
    <!-- Collier -->
    <line x1="26" y1="41" x2="36" y2="38"/>
    <!-- Sangle dos -->
    <line x1="36" y1="38" x2="68" y2="46"/>
    <!-- Sangle poitrine -->
    <path d="M36 38 Q48 62 62 50"/>
    <!-- Anneau arrière -->
    <circle cx="70" cy="47" r="3" stroke="white" stroke-width="2"/>
  </g>
</svg>
