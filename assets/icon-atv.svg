<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" fill="none">
  <!-- Anneau de traction -->
  <circle cx="7" cy="52" r="3.5" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <line x1="10.5" y1="52" x2="20" y2="52" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Roue arrière (grosse, crantée) -->
  <circle cx="28" cy="57" r="16" stroke="currentColor" stroke-width="5" fill="none"/>
  <circle cx="28" cy="57" r="6.5" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <line x1="28" y1="41" x2="28" y2="73" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="57" x2="44" y2="57" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="16.7" y1="45.7" x2="39.3" y2="68.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="16.7" y1="68.3" x2="39.3" y2="45.7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <!-- Roue avant (grosse, crantée) -->
  <circle cx="93" cy="57" r="16" stroke="currentColor" stroke-width="5" fill="none"/>
  <circle cx="93" cy="57" r="6.5" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <line x1="93" y1="41" x2="93" y2="73" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="77" y1="57" x2="109" y2="57" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="81.7" y1="45.7" x2="104.3" y2="68.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="81.7" y1="68.3" x2="104.3" y2="45.7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <!-- Châssis bas (tube) -->
  <line x1="28" y1="52" x2="93" y2="52" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Garde-boue arrière (arrondi au-dessus roue arrière) -->
  <path d="M18 46 Q28 32 38 46" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Garde-boue avant (arrondi au-dessus roue avant) -->
  <path d="M83 46 Q93 32 103 46" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Corps central / réservoir -->
  <path d="M42 52 L40 36 Q60 28 80 36 L78 52 Z" stroke="currentColor" stroke-width="3" stroke-linejoin="round" fill="none"/>

  <!-- Siège (bombé) -->
  <path d="M46 36 Q60 26 74 36" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Tube guidon vertical -->
  <line x1="78" y1="38" x2="82" y2="22" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Guidon horizontal (caractéristique ATV) -->
  <line x1="74" y1="20" x2="90" y2="20" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <circle cx="74" cy="20" r="3" fill="currentColor"/>
  <circle cx="90" cy="20" r="3" fill="currentColor"/>

  <!-- Tube fourche avant -->
  <line x1="86" y1="22" x2="93" y2="43" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
</svg>
