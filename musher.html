<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MushTrack — Profil Musher</title>
  <meta name="description" content="Profil musher public MushTrack" />
  <meta property="og:image" content="/assets/icon-512.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }

    .hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #fc4c02 100%);
      color: #fff;
      padding: 48px 24px 32px;
      text-align: center;
    }
    .hero-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.4);
      object-fit: cover; margin: 0 auto 16px;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; overflow: hidden;
    }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hero h1 { font-size: 1.8rem; font-weight: 800; }
    .hero .region { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }
    .hero .disciplines { font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }

    .badge-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
    .badge { background: rgba(255,255,255,0.18); border-radius: 20px; padding: 4px 12px; font-size: 0.78rem; font-weight: 700; }

    .container { max-width: 560px; margin: 0 auto; padding: 24px 16px 48px; }

    .section { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .section h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .06em; color: #999; font-weight: 700; margin-bottom: 14px; }

    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .kpi { text-align: center; }
    .kpi strong { display: block; font-size: 1.6rem; font-weight: 800; color: #fc4c02; }
    .kpi span { font-size: 0.72rem; color: #888; }

    .dog-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .dog-row:last-child { border-bottom: none; }
    .dog-avatar { width: 38px; height: 38px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; overflow: hidden; flex-shrink: 0; }
    .dog-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .dog-info { flex: 1; }
    .dog-info strong { font-size: 0.9rem; display: block; }
    .dog-info small { font-size: 0.75rem; color: #999; }
    .dog-km { font-size: 0.85rem; font-weight: 700; color: #fc4c02; }

    .race-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .race-row:last-child { border-bottom: none; }
    .race-name { font-size: 0.88rem; font-weight: 600; }
    .race-date { font-size: 0.75rem; color: #999; }
    .race-badge { font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: #fff4f0; color: #fc4c02; }

    .footer { text-align: center; margin-top: 32px; }
    .footer a { color: #fc4c02; font-weight: 700; text-decoration: none; font-size: 0.9rem; }
    .footer small { display: block; color: #bbb; font-size: 0.75rem; margin-top: 4px; }

    .loading { text-align: center; padding: 80px 24px; color: #999; }
    .error { text-align: center; padding: 80px 24px; color: #d94040; }
  </style>
</head>
<body>

<div id="loading" class="loading">
  <div style="font-size:2.5rem;margin-bottom:12px">🐕</div>
  <p>Chargement du profil…</p>
</div>

<div id="content" style="display:none">
  <div class="hero">
    <div class="hero-avatar" id="hero-avatar">🐕</div>
    <h1 id="hero-name">Musher</h1>
    <p class="region" id="hero-region"></p>
    <p class="disciplines" id="hero-disciplines"></p>
    <div class="badge-row" id="hero-badges"></div>
  </div>

  <div class="container">
    <!-- Stats saison -->
    <div class="section">
      <h2>⛷️ Saison en cours</h2>
      <div class="kpi-grid">
        <div class="kpi"><strong id="kpi-km">—</strong><span>km parcourus</span></div>
        <div class="kpi"><strong id="kpi-runs">—</strong><span>sorties</span></div>
        <div class="kpi"><strong id="kpi-dogs">—</strong><span>chiens</span></div>
      </div>
    </div>

    <!-- Courses à venir -->
    <div class="section" id="races-section" style="display:none">
      <h2>🏁 Courses à venir</h2>
      <div id="races-list"></div>
    </div>

    <!-- Palmarès -->
    <div class="section" id="palmares-section" style="display:none">
      <h2>🏆 Palmarès</h2>
      <div id="palmares-list"></div>
    </div>

    <!-- Équipe -->
    <div class="section" id="dogs-section" style="display:none">
      <h2>🐾 L'attelage</h2>
      <div id="dogs-list"></div>
    </div>

    <div class="footer">
      <a href="https://mushtrack-beta-ready.vercel.app">🐕 MushTrack — Gestion d'attelage</a>
      <small>Installer l'app gratuitement sur iOS et Android</small>
    </div>
  </div>
</div>

<div id="error-view" class="error" style="display:none">
  <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
  <p id="error-msg">Profil introuvable.</p>
  <p style="margin-top:12px"><a href="https://mushtrack-beta-ready.vercel.app" style="color:#fc4c02">Créer mon profil MushTrack</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://ipfnldjrpocceptavvaf.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwZm5sZGpycG9jY2VwdGF2dmFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDk0MTQsImV4cCI6MjA5NjYyNTQxNH0.FVkq0EooacG7lETDAwxJ-ArocxUYFVZVfhxdhyWFhrI";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

(async () => {
  const slug = new URLSearchParams(location.search).get("slug") || location.pathname.split("/").pop();
  if (!slug || slug === "musher") {
    showError("Aucun slug dans l'URL. Ex: /musher.html?slug=mo-rar");
    return;
  }

  try {
    const { data, error } = await sb
      .from("mushtrack_profiles")
      .select("slug,data,updated_at")
      .eq("slug", slug)
      .single();

    if (error || !data) { showError("Profil introuvable"); return; }
    render(data.data);
  } catch (e) {
    showError("Erreur de chargement : " + e.message);
  }
})();

function render(d) {
  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";

  // Titre page
  document.title = `${d.name || "Musher"} — MushTrack`;

  // Hero
  const avatar = document.getElementById("hero-avatar");
  if (d.photoDataUrl) {
    avatar.innerHTML = `<img src="${d.photoDataUrl}" alt="${d.name}" />`;
  }
  document.getElementById("hero-name").textContent = d.name || "Musher";
  document.getElementById("hero-region").textContent = d.region ? "📍 " + d.region : "";
  document.getElementById("hero-disciplines").textContent = d.disciplines || "";

  const badges = document.getElementById("hero-badges");
  if (d.level) badges.innerHTML += `<span class="badge">🎽 ${d.level}</span>`;
  if (d.seasonMode) badges.innerHTML += `<span class="badge">${d.seasonMode === "winter" ? "❄️ Hiver" : "☀️ Été"}</span>`;
  if (d.raceType)   badges.innerHTML += `<span class="badge">🏁 ${d.raceType}</span>`;

  // KPIs
  document.getElementById("kpi-km").textContent   = (d.totalKm  || 0).toFixed(0);
  document.getElementById("kpi-runs").textContent  = d.totalRuns || 0;
  document.getElementById("kpi-dogs").textContent  = (d.dogs || []).length;

  // Courses à venir
  const upcoming = (d.agenda || []).filter(a => a.isRace && new Date(a.date) >= new Date()).sort((a,b) => a.date.localeCompare(b.date)).slice(0, 5);
  if (upcoming.length) {
    document.getElementById("races-section").style.display = "block";
    document.getElementById("races-list").innerHTML = upcoming.map(r => `
      <div class="race-row">
        <div>
          <div class="race-name">${r.title || r.name}</div>
          <div class="race-date">${formatDate(r.date)} · ${r.km || "?"} km</div>
        </div>
        <span class="race-badge">${r.category || "Course"}</span>
      </div>`).join("");
  }

  // Palmarès (résultats passés)
  const palmares = (d.agenda || []).filter(a => a.isRace && a.result && a.result.rank).sort((a,b) => b.date.localeCompare(a.date)).slice(0, 6);
  if (palmares.length) {
    document.getElementById("palmares-section").style.display = "block";
    document.getElementById("palmares-list").innerHTML = palmares.map(r => `
      <div class="race-row">
        <div>
          <div class="race-name">${r.title || r.name}</div>
          <div class="race-date">${formatDate(r.date)}</div>
        </div>
        <span class="race-badge">🏆 ${r.result.rank}${r.result.totalParticipants ? "/" + r.result.totalParticipants : ""}</span>
      </div>`).join("");
  }

  // Chiens
  const dogs = (d.dogs || []).slice(0, 12);
  if (dogs.length) {
    document.getElementById("dogs-section").style.display = "block";
    document.getElementById("dogs-list").innerHTML = dogs.map(dog => `
      <div class="dog-row">
        <div class="dog-avatar">${dog.photoDataUrl ? `<img src="${dog.photoDataUrl}" alt="${dog.name}" />` : "🐕"}</div>
        <div class="dog-info">
          <strong>${dog.name}</strong>
          <small>${dog.role || ""} · ${dog.weight || "?"} kg</small>
        </div>
        <div class="dog-km">${Math.round(dog.km || 0)} km</div>
      </div>`).join("");
  }
}

function formatDate(d) {
  if (!d) return "";
  return new Date(d + "T12:00:00").toLocaleDateString("fr-FR", { day: "numeric", month: "short", year: "numeric" });
}

function showError(msg) {
  document.getElementById("loading").style.display    = "none";
  document.getElementById("error-view").style.display = "block";
  document.getElementById("error-msg").textContent    = msg;
}
</script>
</body>
</html>
